<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="wring" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#1f7d5e"/><stop offset="1" stop-color="#34e0a1"/>
    </linearGradient>
    <radialGradient id="wbg" cx="50%" cy="42%" r="72%">
      <stop offset="0" stop-color="#0f241c"/><stop offset="1" stop-color="#0a0c10"/>
    </radialGradient>
  </defs>
  <rect width="120" height="120" rx="16" fill="url(#wbg)"/>

  <!-- expanding success pulses -->
  <circle cx="60" cy="58" r="26" fill="none" stroke="#34e0a1" stroke-width="2.5" opacity="0.5">
    <animate attributeName="r" values="26;50;26" dur="1.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.55;0;0.55" dur="1.8s" repeatCount="indefinite"/>
  </circle>

  <!-- rising profit line -->
  <path d="M30 78 L46 66 L58 72 L90 40" fill="none" stroke="#34e0a1" stroke-width="3.5"
        stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="120" stroke-dashoffset="120" opacity="0.9">
    <animate attributeName="stroke-dashoffset" values="120;0" dur="0.7s" begin="0.1s" fill="freeze"/>
    <animate attributeName="stroke-dashoffset" values="120;0;0;120" dur="3s" begin="3s" repeatCount="indefinite"/>
  </path>
  <path d="M82 40 L90 40 L90 48" fill="none" stroke="#34e0a1" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>

  <!-- check badge -->
  <circle cx="60" cy="58" r="22" fill="none" stroke="url(#wring)" stroke-width="4.5"/>
  <path d="M50 59 L57 66 L72 49" fill="none" stroke="#7CFFC4" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"
        stroke-dasharray="40" stroke-dashoffset="40">
    <animate attributeName="stroke-dashoffset" values="40;0" dur="0.45s" begin="0.3s" fill="freeze"/>
    <animate attributeName="stroke-dashoffset" values="40;0;0;40" dur="3s" begin="3s" repeatCount="indefinite"/>
  </path>

  <!-- confetti + coins rising -->
  <g>
    <circle cx="26" cy="96" r="2.6" fill="#34e0a1"><animate attributeName="cy" values="100;16" dur="1.7s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;0" dur="1.7s" repeatCount="indefinite"/></circle>
    <rect x="92" y="94" width="4" height="4" rx="1" fill="#7CFFC4"><animate attributeName="y" values="98;20" dur="2.1s" begin="0.3s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;0" dur="2.1s" begin="0.3s" repeatCount="indefinite"/><animateTransform attributeName="transform" type="rotate" from="0 94 96" to="180 94 96" dur="2.1s" begin="0.3s" repeatCount="indefinite"/></rect>
    <circle cx="100" cy="90" r="2" fill="#34e0a1"><animate attributeName="cy" values="94;18" dur="1.5s" begin="0.7s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;0" dur="1.5s" begin="0.7s" repeatCount="indefinite"/></circle>
    <rect x="18" y="86" width="4" height="4" rx="1" fill="#EFBE84"><animate attributeName="y" values="90;22" dur="1.9s" begin="0.15s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;0" dur="1.9s" begin="0.15s" repeatCount="indefinite"/></rect>
    <circle cx="108" cy="78" r="2.4" fill="#7CFFC4"><animate attributeName="cy" values="84;20" dur="1.6s" begin="0.9s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;0" dur="1.6s" begin="0.9s" repeatCount="indefinite"/></circle>
  </g>
</svg>
