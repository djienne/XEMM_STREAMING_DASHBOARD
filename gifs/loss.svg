<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="lring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8a3340"/><stop offset="1" stop-color="#ff5d73"/>
    </linearGradient>
    <radialGradient id="lbg" cx="50%" cy="42%" r="72%">
      <stop offset="0" stop-color="#241015"/><stop offset="1" stop-color="#0a0c10"/>
    </radialGradient>
  </defs>
  <rect width="120" height="120" rx="16" fill="url(#lbg)"/>

  <circle cx="60" cy="58" r="26" fill="none" stroke="#ff5d73" stroke-width="2.5" opacity="0.4">
    <animate attributeName="r" values="26;48;26" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.45;0;0.45" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- declining line -->
  <path d="M30 40 L46 52 L58 46 L90 78" fill="none" stroke="#ff5d73" stroke-width="3.5"
        stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="120" stroke-dashoffset="120" opacity="0.85">
    <animate attributeName="stroke-dashoffset" values="120;0" dur="0.7s" begin="0.1s" fill="freeze"/>
    <animate attributeName="stroke-dashoffset" values="120;0;0;120" dur="3s" begin="3s" repeatCount="indefinite"/>
  </path>
  <path d="M82 78 L90 78 L90 70" fill="none" stroke="#ff5d73" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>

  <!-- down badge, gently bobbing -->
  <circle cx="60" cy="58" r="22" fill="none" stroke="url(#lring)" stroke-width="4.5"/>
  <g stroke="#ff97a6" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M60 48 L60 66"/>
    <path d="M51 59 L60 68 L69 59"/>
    <animateTransform attributeName="transform" type="translate" values="0 -2;0 3;0 -2" dur="1.5s" repeatCount="indefinite"/>
  </g>

  <!-- falling marks -->
  <g fill="#ff5d73">
    <circle cx="30" cy="22" r="2.6"><animate attributeName="cy" values="18;100" dur="1.9s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;0" dur="1.9s" repeatCount="indefinite"/></circle>
    <circle cx="92" cy="18" r="2"  ><animate attributeName="cy" values="14;102" dur="2.2s" begin="0.5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;0" dur="2.2s" begin="0.5s" repeatCount="indefinite"/></circle>
    <circle cx="100" cy="26" r="2.4"><animate attributeName="cy" values="22;98" dur="1.7s" begin="0.9s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;0" dur="1.7s" begin="0.9s" repeatCount="indefinite"/></circle>
    <circle cx="20" cy="30" r="2"  ><animate attributeName="cy" values="26;100" dur="2.0s" begin="0.2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;0" dur="2.0s" begin="0.2s" repeatCount="indefinite"/></circle>
  </g>
</svg>
